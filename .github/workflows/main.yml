name: Enterprise Intelligence Platform CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r data_intelligence_platform/requirements.txt
    - name: Run Tests
      run: |
        cd data_intelligence_platform
        export PYTHONPATH=$PYTHONPATH:$(pwd)/src
        pytest --cov=src tests/
    - name: Lint with Ruff
      run: |
        pip install ruff
        ruff check data_intelligence_platform/src
